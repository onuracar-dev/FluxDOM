version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      workspace-dependencies:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    groups:
      website-dependencies:
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
